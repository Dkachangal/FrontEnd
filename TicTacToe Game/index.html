<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tic Tac Toe Game</title>
</head>
<body>
    
    <div class="head">
        <h1>Tic Tac Toe</h1>
    </div>

    <div class="playArea">

        <div class="masterBox">

            <div class="smallBox">
                <div id="circle"></div>
            </div>
            <div class="smallBox"></div>
            <div class="smallBox"></div>
            <div class="smallBox"></div>
            <div class="smallBox"></div>
            <div class="smallBox"></div>
            <div class="smallBox"></div>
            <div class="smallBox"></div>
            <div class="smallBox"></div>

        </div>

        <div class="scoreBoard">

            <div id="playerScore" class="score">
                <p id="userScore">0</p>
                <p>Your Score</p>
            </div>
            
            <div class="restart">
                <button id="restartBtn">Restart</button>
            </div>

            <div id="computerScore" class="score">
                <p id="pcScore">0</p>
                <p>Computer's Score</p>
            </div>


        </div>

        

    </div>

    <div class="foot">
        <p>Made By Divyansh Kachangal</p>
    </div>


    <script src="app.js"></script>
</body>
</html>
