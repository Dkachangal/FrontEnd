<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
     <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="crossorigin="anonymous"referrerpolicy="no-referrer"/>
    <title>Currency Converter</title>
</head>

<body>

    <div class="master">
        <form>
            <div class="all">
                <div class="enterAmount">
                    <input id = "quantity"type="text" placeholder="  Enter Amount">
                </div>
                <div class="conversionPane">
                    <div class="countries" id="fromBox">
                        <img src="https://flagsapi.com/US/flat/64.png" class="flag">
                        <select name="from">
                        </select>
                    </div>
                    <!-- ADD ICON -->
                    <i class="fa-solid fa-arrow-right-arrow-left" style="color: #EFECE3;"></i>
                    <div class="countries" id="toBox">
                        <img src="https://flagsapi.com/IN/flat/64.png" class = "flag">
                        <select name="to">
                        </select>
                    </div>
                </div>
                <div class="convertedAmount">
                    <p id="outputAmount">100</p>
                </div>
                <div class="exchangeButton">
                    <button id="convert">Exchange</button>
                </div>
            </div>
        </form>
    </div>

    <footer>
        <h5>Made By Divyansh Kachangal</53>
    </footer>
    <script src="codes.js"></script>
    <script src="newApp.js"></script>
</body>

</html>
